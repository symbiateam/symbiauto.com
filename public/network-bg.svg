<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <circle cx="200" cy="200" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="400" cy="300" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="600" cy="150" r="5" fill="#22d3ee" filter="url(#glow)"/>
  
  <line x1="200" y1="200" x2="400" y2="300" stroke="#22d3ee" strokeWidth="2" opacity="0.5"/>
  <line x1="400" y1="300" x2="600" y2="150" stroke="#22d3ee" strokeWidth="2" opacity="0.5"/>
</svg>